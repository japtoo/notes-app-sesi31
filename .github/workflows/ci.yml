name: CI Sesi 31

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  IMAGE_NAME: japtoo/notes-app-sesi31

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit-test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Test
        run: npm test

  dependency-audit:
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  sonarqube-scan:
    runs-on: ubuntu-latest
    needs: dependency-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Coverage
        run: npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build-push:
    runs-on: ubuntu-latest
    needs: sonarqube-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: japtoo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            japtoo/notes-app-sesi31:latest
            japtoo/notes-app-sesi31:${{ github.sha }}

  k6-smoke-test:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Docker Image
        run: docker pull japtoo/notes-app-sesi31:${{ github.sha }}

      - name: Run App Container
        run: |
          docker run -d --name notes-app -p 3000:3000 japtoo/notes-app-sesi31:${{ github.sha }}
          sleep 10
          curl --fail http://localhost:3000/

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Smoke Test
        run: SMOKE=true BASE_URL=http://localhost:3000 npm run k6

      - name: Container Logs
        if: always()
        run: docker logs notes-app
